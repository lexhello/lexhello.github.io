<!DOCTYPE html>
<script src="head.js"></script>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alexa — Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Photos-page specific styles ── */

    .photos-header {
      text-align: center;
      padding: 3rem 0 2rem;
    }

    .photos-header p {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 0;
    }

    /* Location group */
    .location-group {
      margin-bottom: 3.5rem;
    }

    .location-label {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    /* Masonry collage grid */
    .collage {
      columns: 3 180px;
      column-gap: 8px;
    }

    .collage .photo {
      break-inside: avoid;
      margin-bottom: 8px;
      overflow: hidden;
      border-radius: 4px;
      background: var(--border);
      position: relative;
      cursor: pointer;
    }

    /* Tall/portrait photos: let them be naturally taller */
    .collage .photo img {
      width: 100%;
      display: block;
      object-fit: cover;
      transition: transform 400ms ease, filter 400ms ease;
      filter: brightness(0.92) saturate(0.9);
    }

    /* Placeholder when no real image is present */
    .collage .photo .placeholder {
      width: 100%;
      background: var(--border);
      display: flex;
      align-items: flex-end;
      padding: 0.6rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Make some placeholders taller to simulate portrait orientation */
    .collage .photo.portrait .placeholder {
      aspect-ratio: 2 / 3;
    }
    .collage .photo.landscape .placeholder {
      aspect-ratio: 4 / 3;
    }
    .collage .photo.square .placeholder {
      aspect-ratio: 1 / 1;
    }

    /* Hover: brighten + slight zoom */
    .collage .photo:hover img,
    .collage .photo:hover .placeholder {
      filter: brightness(1) saturate(1.05);
    }
    .collage .photo:hover img {
      transform: scale(1.03);
    }

    /* Caption overlay */
    .collage .photo .caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 1.2rem 0.75rem 0.6rem;
      background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: #e8e0d5;
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .collage .photo:hover .caption {
      opacity: 1;
    }

    /* Back link */
    .back-link {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      /* keep your existing styles below */
      display: inline-block;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 200ms ease;
      z-index: 10;
    }
    .back-link:hover {
      color: var(--accent);
    }

    /* Title styled like the location labels */
    .photos-header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    @media (max-width: 500px) {
      .collage { columns: 2 120px; }
    }
  </style>
</head>
<body>
  <main class="container" style="max-width: 1200px;">

    <a class="back-link" href="index.html">← Back home</a>

      <h1>Resume</h1>
      <p></p>

    <section class="location-group">
      <div class="location-label">Academics</div>
      <p>CMU ECE Class of 2026</p>
      <p>Harker Class of 2022</p>
    </section>

    <section class="location-group">
      <div class="location-label">Work Experience</div>
      <p>Meta Internship</p>
      <p>Teaching Assistant for Distributed Systems (15-440) and Introduction to Computer Systems (18-213) </p>
    </section>

    <section class="location-group">
      <div class="location-label">Research</div>
      <p> WIP </p>
    </section>

    <section class="location-group">
      <div class="location-label"></div>
      <p></p>
    </section>


  </main>
</body>
</html>
